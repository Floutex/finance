<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6ee7b7"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Outer ring representing unity/sharing -->
  <circle cx="16" cy="17" r="10" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.3"/>
  <!-- Dollar sign -->
  <text x="16" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="800" fill="url(#accent)" text-anchor="middle">$</text>
  <!-- Two people dots (couple) -->
  <circle cx="11" cy="6.5" r="2.2" fill="#6ee7b7" opacity="0.9"/>
  <circle cx="21" cy="6.5" r="2.2" fill="#34d399" opacity="0.9"/>
  <!-- Heart-shaped connection -->
  <path d="M14 6.5 Q16 4 18 6.5" fill="none" stroke="#4ade80" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
</svg>
