<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Gastos Compartilhados">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6E7FF1"/>
      <stop offset="1" stop-color="#4E5ED7"/>
    </linearGradient>
    <clipPath id="lens">
      <circle cx="12.9" cy="16" r="7"/>
    </clipPath>
  </defs>

  <!-- Brand tile: indigo (app --primary), same family as the in-app "G" logo -->
  <rect width="32" height="32" rx="8" fill="url(#tile)"/>
  <!-- Soft inner highlight: premium surface feel, fades out at favicon size -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="7.25" fill="none" stroke="#FFFFFF" stroke-opacity="0.10"/>

  <!-- Two overlapping circles = the two people; the filled intersection = what they share -->
  <g fill="none" stroke="#F4F5FD" stroke-width="2.4">
    <circle cx="12.9" cy="16" r="7"/>
    <circle cx="19.1" cy="16" r="7"/>
  </g>
  <circle cx="19.1" cy="16" r="7" fill="#F4F5FD" clip-path="url(#lens)"/>
</svg>
